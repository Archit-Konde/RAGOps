name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: ragops
          POSTGRES_USER: ragops
          POSTGRES_PASSWORD: ragops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ragops -d ragops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ragops:ragops@localhost:5432/ragops

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.lock

      - name: Run linter
        run: |
          ruff check .
          ruff format --check .

      - name: Run database migration
        run: >
          PGPASSWORD=ragops psql -h localhost -U ragops -d ragops
          -f apps/api/app/db/migrations/001_init.sql

      - name: Run tests
        run: pytest tests/ -v --tb=short
