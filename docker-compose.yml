services:
  postgres:
    image: ankane/pgvector:pg15
    environment:
      POSTGRES_DB: ragops
      POSTGRES_USER: ragops
      POSTGRES_PASSWORD: ragops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/api/app/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragops -d ragops"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ragops:ragops@postgres:5432/ragops
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
